apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nginx-promethus-rule
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
spec:
  groups:
  - name: nginx-prometheus-rule
    rules:
    - alert: NginxDown
      expr: up{job="nginx"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "NGINX está fora"
        description: "O nosso servidor web NGINX está fora!"
    - alert: NginxHighRequestRate
      expr: rate(nginx_http_requests_total) > 10
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "O NGINX está recebendo um número alto de requests"
        description: "NGINX está com um número alto de requisições o você pode ver mais detalhes abaixo."
