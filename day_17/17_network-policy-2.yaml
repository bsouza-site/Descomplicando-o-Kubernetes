apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: second-netpol
  namespace: giropops
spec:
  podSelector: {} 
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values: ["ingress-nginx", "giropops"]
